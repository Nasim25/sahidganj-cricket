<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SAHIDGANJ EID FESTIVAL CRICKET MATCH </title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-gray-50 pb-20">

        <div class="w-full bg-gray-200 flex justify-center shadow-md">
            <div class="w-full shadow-sm">
                <img src="banner.jpg" alt="Banner" class="w-full h-80 md:h-80">
            </div>
        </div>

        <div class="max-w-5xl mx-auto p-4 md:p-8">
            <h1
                class="text-3xl font-bold text-center text-blue-900 my-8">খেলোয়াড় তালিকা ২০২৬</h1>

            <div
                class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr
                                class="bg-blue-600 text-white text-sm md:text-base">
                                <th class="p-4 border">মূল নাম</th>
                                <th class="p-4 border">জার্সি নাম</th>
                                <th
                                    class="p-4 border w-24 text-center">নম্বর</th>
                                <th
                                    class="p-4 border w-28 text-center">সাইজ</th>
                                <th class="p-4 border text-center">অ্যাকশন</th>
                            </tr>
                        </thead>
                        <tbody id="playerTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
            <p class="text-center mt-6 text-gray-500 italic text-sm">* আপনার
                নামের পাশের তথ্য পূরণ করে 'Save' বাটনে ক্লিক করুন। পরে চাইলে
                নম্বর বা সাইজ বদলে আবার 'Update' করতে পারবেন।</p>
        </div>

        <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ১. আপনার Firebase Config এখানে বসান
        const firebaseConfig = {
            apiKey: "AIzaSyDdvomfhQgB8lJavi7PvOZ1MGPgZXuxlZ4",
            authDomain: "cricket-match-a9828.firebaseapp.com",
            projectId: "cricket-match-a9828",
            storageBucket: "cricket-match-a9828.firebasestorage.app",
            messagingSenderId: "516844913881",
            appId: "1:516844913881:web:b88e17ab1b69d5e6efeac8",
            measurementId: "G-X85NG7Y032"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const players = [
            "মোঃ রুবেল রানা (ভাই)", "ইমরান (ভাই)", "রনি ডাক্তার", "এনামুল ভাই", 
            "এস এম তারেক রহমান", "মোঃ নাসিম উদ্দিন", "সাদ্দাম", "সিরাজুল", 
            "নেওয়াজ শরীফ", "রোকন", "সোহাগ — (ছোট)", "রিফাত", 
            "ইমন (মাস্টার)", "সাগর", "তানজীদ", "সিয়াম (ছোট)", 
            "শুভ (খান)", "আলিফ", "রাজু (ছোট)", "রবিন"
        ];

        const tableBody = document.getElementById('playerTableBody');

        // ২. টেবিল লোড করা
        players.forEach((name, index) => {
            const row = document.createElement('tr');
            row.className = "border-b hover:bg-blue-50 transition";
            row.innerHTML = `
                <td class="p-4 border font-semibold text-gray-700">${name}</td>
                <td class="p-4 border">
                    <input type="text" id="name-${index}" class="w-full p-2 border rounded text-sm" placeholder="সঠিক নাম">
                </td>
                <td class="p-4 border">
                    <input type="number" id="num-${index}" class="w-full p-2 border rounded text-center text-sm font-bold" placeholder="00">
                </td>
                <td class="p-4 border">
                    <select id="size-${index}" class="w-full p-2 border rounded text-sm">
                        <option value="">Size</option>
                        <option>M</option><option>L</option><option>XL</option><option>XXL</option>
                    </select>
                </td>
                <td class="p-4 border text-center">
                    <button id="btn-${index}" class="bg-blue-600 text-white px-5 py-2 rounded-lg font-bold hover:bg-blue-700 transition active:scale-95 shadow">
                        Save
                    </button>
                </td>
            `;
            tableBody.appendChild(row);

            // বাটনে ক্লিক করলে সেভ বা আপডেট হবে
            document.getElementById(`btn-${index}`).addEventListener('click', () => saveOrUpdate(index));
        });

        // ৩. সেভ বা আপডেট করার ফাংশন
        async function saveOrUpdate(index) {
            const btn = document.getElementById(`btn-${index}`);
            const originalName = players[index];
            const correctionName = document.getElementById(`name-${index}`).value;
            const jerseyNo = document.getElementById(`num-${index}`).value;
            const jerseySize = document.getElementById(`size-${index}`).value;

            if (!jerseyNo || !jerseySize) {
                alert("জার্সি নম্বর এবং সাইজ অবশ্যই সিলেক্ট করতে হবে!");
                return;
            }

            btn.innerText = "Wait...";
            btn.disabled = true;

            try {
                await setDoc(doc(db, "jersey_database_2026", originalName), {
                    originalName: originalName,
                    correctionName: correctionName || originalName,
                    jerseyNumber: jerseyNo,
                    size: jerseySize,
                    updatedAt: new Date()
                });
                
                btn.innerText = "Updated ✅";
                btn.className = "bg-green-600 text-white px-5 py-2 rounded-lg font-bold transition";
                setTimeout(() => {
                    btn.innerText = "Update";
                    btn.className = "bg-blue-600 text-white px-5 py-2 rounded-lg font-bold hover:bg-blue-700 transition";
                    btn.disabled = false;
                }, 2000);

            } catch (error) {
                console.error(error);
                alert("দুঃখিত, এরর হয়েছে। আপনার Firebase Rules চেক করুন।");
                btn.innerText = "Save";
                btn.disabled = false;
            }
        }

        // ৪. ডাটাবেজ থেকে ডাটা এনে বক্সে বসানো (যাতে রিফ্রেশ দিলেও ডাটা দেখা যায়)
        onSnapshot(collection(db, "jersey_database_2026"), (snapshot) => {
            snapshot.forEach((doc) => {
                const data = doc.data();
                const pIndex = players.indexOf(data.originalName);
                if (pIndex !== -1) {
                    document.getElementById(`name-${pIndex}`).value = data.correctionName;
                    document.getElementById(`num-${pIndex}`).value = data.jerseyNumber;
                    document.getElementById(`size-${pIndex}`).value = data.size;
                    document.getElementById(`btn-${pIndex}`).innerText = "Update";
                }
            });
        });

    </script>
    </body>
</html>
